{% extends "base.html" %}

{% block title %}Tipo de FO{% endblock %}

{% block content %}

<h2 class="mb-4">
    {% if tipo %}Editar Tipo de FO{% else %}Novo Tipo de FO{% endif %}
</h2>

<div class="card card-glass p-4">

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nome do Tipo</label>
            <input type="text"
                   name="nome"
                   class="form-control"
                   value="{{ tipo.nome if tipo else '' }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Sinal</label>
            <select name="sinal"
                    class="form-select"
                    required>
                <option value="">Selecione...</option>
                <option value="POSITIVO"
                    {% if tipo and tipo.sinal == "POSITIVO" %}selected{% endif %}>
                    POSITIVO
                </option>
                <option value="NEGATIVO"
                    {% if tipo and tipo.sinal == "NEGATIVO" %}selected{% endif %}>
                    NEGATIVO
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Pontos</label>
            <input type="number"
                   name="pontos"
                   class="form-control"
                   value="{{ tipo.pontos if tipo else '' }}"
                   required>
            <small class="text-muted">
                Para tipos negativos, cadastre valor positivo. O sistema subtrai automaticamente.
            </small>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input"
                   type="checkbox"
                   name="ativo"
                   id="ativo"
                   {% if not tipo or tipo.ativo %}checked{% endif %}>

            <label class="form-check-label"
                   for="ativo">
                Ativo
            </label>
        </div>

        <button class="btn btn-success">
            Salvar
        </button>

        <a href="{{ url_for('fo.admin_tipos') }}"
           class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

{% endblock %}
